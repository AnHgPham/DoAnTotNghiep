seed: 42

audio:
  sample_rate: 16000
  duration_sec: 1.0
  target_length: 16000

mfcc:
  n_mfcc: 40
  num_features: 10
  n_fft: 1024
  win_length: 640
  hop_length: 320
  n_mels: 40
  center: false
  mel_scale: "slaney"
  norm: "slaney"
  log_mels: false
  power: 2
  pad_mode: "constant"

model:
  architecture: "DSCNN-L"
  channels: 276
  num_ds_blocks: 5
  embedding_dim: 276
  feature_mode: "NORM"

training:
  epochs: 40
  episodes_per_epoch: 400
  n_classes: 80
  n_samples: 20
  triplet_margin: 0.5
  optimizer:
    type: "Adam"
    lr: 0.001
  scheduler:
    type: "StepLR"
    step_size: 20
    gamma: 0.5

noise:
  demand_dir: "data/demand"
  prob: 0.95
  snr_db: 5.0

data:
  gsc_dir: "data/gsc_v2"
  mswc_dir: "data/mswc_en"
  demand_dir: "data/demand"
  mswc_train_words: 450
  mswc_val_words: 50
  mswc_eval_words: 263

checkpoint:
  dir: "checkpoints"
  save_every: 5

evaluation:
  n_runs: 5
  target_far: 0.05
  n_way: 5
  k_shot: 5

streaming:
  vad_threshold: 0.5
  min_speech_ms: 250
  window_size: 16000
  stride: 8000
